<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ITTA</title>
<link rel="icon" href="/logo.png">
<link rel="shortcut icon" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">

<style>
html, body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

.hero img {
  width: 90%;
  height: auto;
  display: block;
}

.contact-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  max-width: 1000px;
  margin: 40px auto 0 auto;
  text-align: center;
}

.contact-grid div {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 10px;
  backdrop-filter: blur(6px);
}

/* ===== MOBILE FIX ===== */

@media (max-width: 768px) {

  .hero {
    height: auto;
    min-height: 100vh;
    background-position: center top;
    background-size: cover;
  }

  .contact-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }

}

/* Pagrindinis fonas – identiškas tavo paveikslui */

  }
  </style>
</head>
<body>

<section class="hero">
  <img src="Vizualas.jpg" alt="ITTA Visual" style="width:100%; height:auto;">
</section>

<section class="contact">
  <h2>Contact</h2>

</section>
